$kind: http-example
request:
  url: http://localhost:8080/api/users
  method: POST
  body:
    type: json
    content: "{\r

      \    \"id\": 1,\r

      \    \"name\": \"Juan\",\r

      \    \"email\": \"juan@email.com\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Vary
      value: Origin
    - key: Vary
      value: Access-Control-Request-Method
    - key: Vary
      value: Access-Control-Request-Headers
    - key: Content-Type
      value: application/json
    - key: Transfer-Encoding
      value: chunked
    - key: Date
      value: Sun, 22 Mar 2026 23:10:04 GMT
    - key: Keep-Alive
      value: timeout=60
    - key: Connection
      value: keep-alive
  body:
    type: text
    content: |-
      {
          "name": "Juan",
          "email": "juan@email.com",
          "id": 1
      }
order: 1000
