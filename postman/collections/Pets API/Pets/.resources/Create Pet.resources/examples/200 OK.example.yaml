$kind: http-example
request:
  url: http://localhost:8080/api/pets
  method: POST
  body:
    type: json
    content: "{\r

      \    \"name\": \"Firulais\",\r

      \    \"Temperament\": \"Pacify\",\r

      \    \"species\": \"Dog\",\r

      \    \"size\": \"small\",\r

      \    \"sex\": \"famele\",\r

      \    \"SpecifyNeeds\": \"Any\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Vary
      value: Origin
    - key: Vary
      value: Access-Control-Request-Method
    - key: Vary
      value: Access-Control-Request-Headers
    - key: Content-Type
      value: application/json
    - key: Transfer-Encoding
      value: chunked
    - key: Date
      value: Mon, 23 Mar 2026 02:51:55 GMT
    - key: Keep-Alive
      value: timeout=60
    - key: Connection
      value: keep-alive
  body:
    type: text
    content: |-
      {
          "name": "Firulais",
          "Temperament": "Pacify",
          "species": "Dog",
          "size": "small",
          "sex": "famele",
          "SpecifyNeeds": "Any",
          "id": 1
      }
order: 1000
