$kind: http-example
request:
  url: http://localhost:8080/api/pets/1/medical-history
  method: POST
  body:
    type: json
    content: "{\r

      \    \"description\": \"Checkup\",\r

      \    \"date\": \"2026-03-20\"\r

      }"
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Vary
      value: Origin
    - key: Vary
      value: Access-Control-Request-Method
    - key: Vary
      value: Access-Control-Request-Headers
    - key: Content-Type
      value: application/json
    - key: Transfer-Encoding
      value: chunked
    - key: Date
      value: Mon, 23 Mar 2026 03:07:52 GMT
    - key: Keep-Alive
      value: timeout=60
    - key: Connection
      value: keep-alive
  body:
    type: text
    content: |-
      [
          {
              "description": "Checkup",
              "date": "2026-03-20"
          }
      ]
order: 2000
